<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Аккорды Фортепиано</title>
  <script>
    window.BUILD_VERSION = "2026-03-25-07";
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "style.css?v=" + window.BUILD_VERSION;
    document.head.appendChild(css);
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="row">
        <input id="songName" class="input" placeholder="Название песни..." />
        <button id="saveSong" class="btn btn-success">OK</button>
      </div>
      <div class="row icon-row">
        <button id="openSongs" class="btn icon-btn icon-yellow" aria-label="Песни" title="Песни">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6a2 2 0 0 1 2-2h5l2 2h5a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/>
          </svg>
        </button>
        <button id="toggleColor" class="btn icon-btn icon-purple" aria-label="Цвет" title="Цвет">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a9 9 0 1 0 0 18c1.2 0 2.2-1 2.2-2.2 0-.6-.3-1.2-.8-1.6.7-.2 1.3-.4 1.9-.8 2.7-1.5 3.8-4.9 2.3-7.6A9 9 0 0 0 12 3zm-4 6a1.6 1.6 0 1 1 0 3.2A1.6 1.6 0 0 1 8 9zm6-2a1.6 1.6 0 1 1 0 3.2A1.6 1.6 0 0 1 14 7zm3 5a1.6 1.6 0 1 1 0 3.2A1.6 1.6 0 0 1 17 12z"/>
          </svg>
        </button>
        <button id="togglePiano" class="btn icon-btn icon-cyan" aria-label="Пианино" title="Пианино">
          <svg class="icon icon-piano" viewBox="0 0 70 32" aria-hidden="true">
            <rect x="1" y="1" width="68" height="30" rx="3" ry="3"/>
            <rect class="white" x="2" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="11" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="20" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="29" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="38" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="47" y="2" width="9" height="28" rx="1"/>
            <rect class="white" x="56" y="2" width="11" height="28" rx="1"/>
            <rect class="black" x="7" y="2" width="6" height="16" rx="1"/>
            <rect class="black" x="16" y="2" width="6" height="16" rx="1"/>
            <rect class="black" x="34" y="2" width="6" height="16" rx="1"/>
            <rect class="black" x="43" y="2" width="6" height="16" rx="1"/>
            <rect class="black" x="52" y="2" width="6" height="16" rx="1"/>
          </svg>
        </button>
        <button id="clearAll" class="btn icon-btn icon-red" aria-label="Очистить" title="Очистить">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 8h10l-1 12H8zM9 4h6l1 2H8z"/>
          </svg>
        </button>
        <button id="fullScreen" class="btn icon-btn icon-blue" aria-label="Полный экран" title="Полный экран">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9V4h5v2H6v3zm10-5h5v5h-2V6h-3zm3 10v5h-5v-2h3v-3zM4 20v-5h2v3h3v2z"/>
          </svg>
        </button>
      </div>
      <div class="row">
        <button id="mode0" class="btn">ОСН</button>
        <button id="mode1" class="btn">1 обр</button>
        <button id="mode2" class="btn">2 обр</button>
        <button id="transDown" class="btn btn-dark">-1</button>
        <button id="transUp" class="btn btn-dark">+1</button>
      </div>
      <div class="selected">
        <div id="selectedGrid" class="grid"></div>
      </div>
      <div class="row">
        <input id="search" class="input" placeholder="Поиск аккорда..." />
      </div>
    </header>

    <main class="main">
      <div id="chordsList" class="chords-list"></div>
    </main>
  </div>

  <div id="fullModal" class="modal hidden">
    <div class="modal-content">
      <div class="row">
        <button id="fullMode0" class="btn">ОСН</button>
        <button id="fullMode1" class="btn">1 обр</button>
        <button id="fullMode2" class="btn">2 обр</button>
        <button id="fullTransDown" class="btn btn-dark">-1</button>
        <button id="fullTransUp" class="btn btn-dark">+1</button>
        <button id="fullClose" class="btn btn-danger">Закрыть</button>
      </div>
      <div id="fullGrid" class="grid full"></div>
    </div>
  </div>

  <div id="songsModal" class="modal hidden">
    <div class="modal-content songs">
      <div class="row space">
        <div class="title">Песни (★ — избранное)</div>
        <button id="songsClose" class="btn btn-danger">Закрыть</button>
      </div>
      <div id="songsList" class="songs-list"></div>
    </div>
  </div>

  <div id="chordModal" class="modal hidden">
    <div class="modal-content actions">
      <div class="title">Действия с аккордом</div>
      <div class="actions-list">
        <button id="actMode0" class="btn">ОСН</button>
        <button id="actMode1" class="btn">1 обр</button>
        <button id="actMode2" class="btn">2 обр</button>
        <button id="actUp" class="btn btn-dark">+1</button>
        <button id="actDown" class="btn btn-dark">-1</button>
        <button id="actClose" class="btn btn-danger">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const s1 = document.createElement("script");
    s1.src = "chords-data.js?v=" + window.BUILD_VERSION;
    s1.onload = () => {
      const s2 = document.createElement("script");
      s2.src = "app.js?v=" + window.BUILD_VERSION;
      document.body.appendChild(s2);
    };
    document.body.appendChild(s1);
  </script>
</body>
</html>
