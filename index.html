<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Аккорды Фортепиано</title>
  <script>
    window.BUILD_VERSION = "2026-03-29-01";
    const css = document.createElement("link");
    css.rel = "stylesheet";
    css.href = "style.css?v=" + window.BUILD_VERSION;
    document.head.appendChild(css);
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="row">
        <input id="songName" class="input" placeholder="Название песни..." />
        <button id="saveSong" class="btn">OK</button>
      </div>
      <div class="row icon-row">
        <button id="openSongs" class="btn icon-btn icon-yellow" aria-label="Песни" title="Песни">
          <img class="icon-img" src="icons/icon-folder.png" alt="" />
        </button>
        <button id="toggleColor" class="btn icon-btn icon-purple" aria-label="Цвет" title="Цвет">
          <img class="icon-img" src="icons/icon-palette.png" alt="" />
        </button>
        <button id="togglePiano" class="btn icon-btn icon-cyan" aria-label="Пианино" title="Пианино">
          <img class="icon-img icon-img-wide" src="icons/icon-piano.png" alt="" />
        </button>
        <button id="clearAll" class="btn icon-btn icon-red" aria-label="Очистить" title="Очистить">
          <img class="icon-img" src="icons/icon-trash.png" alt="" />
        </button>
        <button id="openImport" class="btn icon-btn icon-green" aria-label="Вставить текст" title="Вставить текст">
          <img class="icon-img" src="icons/icon-import.png" alt="" />
        </button>
        <button id="fullScreen" class="btn icon-btn icon-blue" aria-label="Полный экран" title="Полный экран">
          <img class="icon-img" src="icons/icon-fullscreen.png" alt="" />
        </button>
      </div>
      <div class="row action-row">
        <button id="mode0" class="btn">ОСН</button>
        <button id="mode1" class="btn">1 обр</button>
        <button id="mode2" class="btn">2 обр</button>
        <button id="smartInv" class="btn">Умное обр</button>
        <button id="transDown" class="btn btn-dark">-1</button>
        <button id="transUp" class="btn btn-dark">+1</button>
      </div>
      <div class="selected">
        <div id="selectedGrid" class="grid"></div>
      </div>
      <div class="row">
        <input id="search" class="input" placeholder="Поиск аккорда..." />
      </div>
      <div class="row tiny">
        <div class="hint">Нажмите на название аккорда, чтобы добавить его (можно повторять). Счетчик показывает количество.</div>
      </div>
    </header>

    <main class="main">
      <div id="chordsList" class="chords-list"></div>
    </main>
  </div>

  <div id="fullModal" class="modal hidden">
    <div class="modal-content">
      <div class="row">
        <button id="fullMode0" class="btn">ОСН</button>
        <button id="fullMode1" class="btn">1 обр</button>
        <button id="fullMode2" class="btn">2 обр</button>
        <button id="fullSmartInv" class="btn">Умное обр</button>
        <button id="fullTransDown" class="btn btn-dark">-1</button>
        <button id="fullTransUp" class="btn btn-dark">+1</button>
        <button id="printPdf" class="btn btn-print" title="Сохранить / напечатать PDF">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" style="fill:#fff;width:20px;height:20px;">
            <path d="M19 8H5c-1.66 0-3 1.34-3 3v5h4v4h12v-4h4v-5c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
          </svg>
          PDF
        </button>
        <button id="fullClose" class="btn btn-danger">Закрыть</button>
      </div>
      <!-- Заголовок для печати — скрыт в обычном виде, виден только в PDF -->
      <div id="printTitle" class="print-title"></div>
      <div id="fullGrid" class="grid full"></div>
    </div>
  </div>

  <div id="songsModal" class="modal hidden">
    <div class="modal-content songs">
      <div class="row space">
        <div class="title">Песни (★ — избранное)</div>
        <button id="songsClose" class="btn btn-danger">Закрыть</button>
      </div>
      <div id="songsList" class="songs-list"></div>
    </div>
  </div>

  <div id="chordModal" class="modal hidden">
    <div class="modal-content actions">
      <div class="title">Действия с аккордом</div>
      <div class="actions-list">
        <button id="actMode0" class="btn">ОСН</button>
        <button id="actMode1" class="btn">1 обр</button>
        <button id="actMode2" class="btn">2 обр</button>
        <button id="actUp" class="btn btn-dark">+1</button>
        <button id="actDown" class="btn btn-dark">-1</button>
        <button id="actClose" class="btn btn-danger">Закрыть</button>
      </div>
    </div>
  </div>

  <div id="importModal" class="modal hidden">
    <div class="modal-content import">
      <div class="row space">
        <div class="title">Вставить текст с аккордами</div>
        <button id="importClose" class="btn btn-danger">Закрыть</button>
      </div>
      <textarea id="importText" class="import-text" placeholder="Вставьте текст песни с аккордами..."></textarea>
      <div class="row">
        <label class="import-toggle">
          <input id="importSoftMode" type="checkbox" />
          Мягкий режим (считывать одиночные аккорды в строке)
        </label>
      </div>
      <div class="row action-row">
        <button id="importScan" class="btn">Найти аккорды</button>
        <button id="importAdd" class="btn btn-success">Добавить (0)</button>
      </div>
      <div id="importPreview" class="import-preview"></div>
    </div>
  </div>

  <script>
    const s1 = document.createElement("script");
    s1.src = "chords-data.js?v=" + window.BUILD_VERSION;
    s1.onload = () => {
      const s2 = document.createElement("script");
      s2.src = "app.js?v=" + window.BUILD_VERSION;
      document.body.appendChild(s2);
    };
    document.body.appendChild(s1);
  </script>
</body>
</html>
